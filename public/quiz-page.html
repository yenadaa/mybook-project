<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBook 복습 퀴즈</title>
    
    <link rel="stylesheet" href="main.css">
    
    <style>
        /* =========================================
           1. 전체 레이아웃 (Layout)
           ========================================= */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 전체 스크롤 방지 */
            background-color: #f1f5f9; /* 배경색 살짝 변경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #334155;
        }

        .quiz-layout {
            display: flex;
            height: 100vh;
        }

        /* --- 사이드바 --- */
        .quiz-sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 4px 0 24px rgba(0,0,0,0.02);
        }

        .quiz-sidebar h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 20px 0;
            color: #1e293b;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            align-content: start;
            padding-right: 5px;
        }

        /* 문항 번호 버튼 */
        .nav-btn {
            aspect-ratio: 1; /* 정사각형 유지 */
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s;
        }
        .nav-btn:hover { 
            background: #e2e8f0; 
            color: #334155;
        }
        .nav-btn.completed { 
            background: #22c55e; 
            color: white; 
            border-color: #16a34a; 
        }

        /* 결과 제출 버튼 */
        .submit-session-btn {
            margin-top: 24px;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
        }
        .submit-session-btn:hover { background-color: #2563eb; transform: translateY(-1px); }
        .submit-session-btn:active { transform: translateY(0); }


        /* --- 메인 콘텐츠 --- */
        .quiz-main {
            flex: 1;
            background-color: #f1f5f9;
            padding: 40px;
            overflow-y: auto;
            box-sizing: border-box;
        }

        .quiz-main h1 {
            margin: 0 0 30px 0;
            font-size: 1.8rem;
            color: #0f172a;
            font-weight: 800;
        }

        #quiz-content {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* =========================================
           2. 퀴즈 카드 디자인 (핵심!)
           ========================================= */
        
        /* 카드 박스 */
        .quiz-item {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px; /* 둥근 모서리 */
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); /* 부드러운 그림자 */
            transition: transform 0.2s;
        }
        .quiz-item:hover {
            transform: translateY(-2px); /* 살짝 떠오르는 효과 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        /* 문제 텍스트 */
        .quiz-question {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* --- 보기 (OX / 객관식) --- */
        .quiz-options {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-options li {
            padding: 16px 20px;
            background-color: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            color: #475569;
            transition: all 0.2s;
            position: relative;
        }

        .quiz-options li:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }

        /* 정답/오답 스타일 */
        .quiz-options li.correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #15803d !important;
            font-weight: bold;
        }
        .quiz-options li.correct::after {
            content: "✔ 정답";
            position: absolute;
            right: 20px;
            font-size: 0.9em;
        }

        .quiz-options li.incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
        }
        
        /* 풀고 난 뒤 비활성화 */
        .quiz-item.answered .quiz-options li { cursor: default; }
        .quiz-item.answered .quiz-options li:not(.correct):not(.incorrect) {
            opacity: 0.4;
            pointer-events: none;
        }


        /* --- 단답형 --- */
        .short-answer-container {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .short-answer-input {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
            background-color: #fff; /* 흰색 배경 강제 */
        }
        .short-answer-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* 정답/오답 입력창 스타일 */
        .short-answer-input.correct {
            border-color: #22c55e;
            background-color: #f0fdf4;
            color: #15803d;
        }
        .short-answer-input.incorrect {
            border-color: #ef4444;
            background-color: #fef2f2;
            color: #b91c1c;
        }

        .check-answer-btn {
            padding: 0 24px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .check-answer-btn:hover { background-color: #2563eb; }
        .check-answer-btn:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        /* 피드백 박스 */
        .answer-feedback {
            margin-top: 16px;
            padding: 12px 16px;
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
            border-radius: 4px;
            color: #1e40af;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .answer-feedback.hidden { display: none; }


        /* --- 기타 유틸 --- */
        .btn-text-small {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 4px 8px;
            color: #64748b;
            font-size: 0.8rem;
            cursor: pointer;
            margin-bottom: 12px;
            display: inline-block;
        }
        .btn-text-small:hover {
            background: #e2e8f0;
            color: #334155;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.1rem;
            color: #64748b;
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .quiz-layout { flex-direction: column; }
            .quiz-sidebar { 
                width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e2e8f0; 
            }
            .sidebar-nav { max-height: 100px; }
            .quiz-main { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="quiz-layout">
        <aside class="quiz-sidebar">
            <h2>문항 이동</h2>
            <div id="sidebar-nav" class="sidebar-nav"></div>
            
            <button id="submit-session-btn" class="submit-session-btn">
                결과 제출하기
            </button>
        </aside>

        <main class="quiz-main">
            <h1>오늘의 복습 퀴즈</h1>
            
            <div id="quiz-content">
                <p class="loading">퀴즈를 불러오는 중입니다...</p>
            </div>
        </main>
    </div>

    <script src="A.firebase.js" type="module"></script>
    <script src="quiz-page.js" type="module"></script>

</body>
</html>
