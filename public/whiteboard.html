<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>백지 복습 모드</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f0f0; display: flex; flex-direction: column; height: 100vh; }
        
        /* 상단 툴바 */
        .toolbar { padding: 10px; background: white; display: flex; gap: 10px; border-bottom: 1px solid #ccc; }
        button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }

        /* 그림판 영역 */
        #canvas-container { flex: 1; position: relative; background: white; margin: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        canvas { display: block; touch-action: none; /* 태블릿 터치 스크롤 방지 (중요!) */ }
        
        /* 로딩 오버레이 */
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); color: white; justify-content: center; align-items: center; font-size: 24px; z-index: 999; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="clearCanvas()" class="btn-danger">지우기</button>
        <button onclick="submitReview()" class="btn-primary">📝 채점받기</button>
        <button onclick="goBack()" class="btn-secondary">⬅ 닫기</button>
    </div>

    <div id="canvas-container">
        <canvas id="drawingCanvas"></canvas>
    </div>

    <div id="loading">채점 중입니다... 🤖</div>

    <script>

        function goBack() {
        // 그냥 뒤로가기 하면 다시 PDF 화면이 나옵니다.
        window.history.back();
        // 또는 window.location.href = "index.html"
    }


    
        // 1. URL에서 파라미터 추출 (?bookId=xxxxx)
        const urlParams = new URLSearchParams(window.location.search);
        const currentBookId = urlParams.get('bookId');

        if (!currentBookId) {
            alert("문서 정보가 없습니다. 메인 화면으로 돌아갑니다.");
            window.location.href = "index.html"; // 쫓아내기
        }
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        // 캔버스 크기 맞추기
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'black';
        }
        window.addEventListener('resize', resize);
        resize(); // 초기 실행

        // 그리기 로직 (마우스 + 터치 지원)
        let isDrawing = false;

        function startDraw(e) {
            isDrawing = true;
            draw(e);
        }
        function endDraw() {
            isDrawing = false;
            ctx.beginPath(); // 경로 끊기
        }
        function draw(e) {
            if (!isDrawing) return;
            
            // 마우스 vs 터치 좌표 계산
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = canvas.getBoundingClientRect();

            ctx.lineTo(clientX - rect.left, clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(clientX - rect.left, clientY - rect.top);
        }

        // 이벤트 리스너 (PC + Mobile)
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mousemove', draw);
        
        canvas.addEventListener('touchstart', startDraw);
        canvas.addEventListener('touchend', endDraw);
        canvas.addEventListener('touchmove', draw);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 🚀 서버로 전송
        // 2. 서버 전송 함수 수정
        async function submitReview() {
            // 하드코딩했던 ID 대신, 위에서 받은 ID 사용
            const bookId = currentBookId;
            const imageData = canvas.toDataURL('image/png').split(',')[1]; // Base64 추출

            document.getElementById('loading').style.display = 'flex';

            try {
                // 아래 URL은 본인 Cloud Functions 주소로 변경
                const response = await fetch("https://gradeblankpaper-kbtdkj4qza-du.a.run.app", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        bookId: bookId, 
                        imageData: imageData 
                    })
                });
                
                const result = await response.json();
                alert(`[채점 결과]\n점수: ${result.score}점\n\n피드백: ${result.feedback}`);
                
            } catch (error) {
                alert("에러 발생: " + error);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
